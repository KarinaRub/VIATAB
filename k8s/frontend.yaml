apiVersion: apps/v1
kind: Deployment
metadata:
  name: viatab-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: viatab-frontend
  template:
    metadata:
      labels:
        app: viatab-frontend
    spec:
      containers:
        - name: frontend
          image: viatab-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: viatab-frontend
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173